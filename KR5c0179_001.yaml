front:
  text: 大滌洞天記卷上
  hash: sha256:84561a7305dc35935934cda8cc3cd55e6dff3568f205b981b7a3be5b177e7ef7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0179_HFL_001-001a, image: hfl/0559/0559-060.png}
body:
  text: 本山鄧牧心編敍宫觀夫得道之士以無何爲鄉太虚爲家日月之光華烟雲之變化湖海山嶽之浩汗麗澤不過目睫間所寄物爾何待占一丘一壑之勝營一宫一室之安與編户雜處於人間世耶良由古道日微淳風不競馳情嗜欲者豈知有清靜可宗抗志功名者豈信有神仙可學是故太上設教聖皇潜心黄帝問道崆峒堯見四子藐姑射於是周穆草樓發其源漢武竹宫桂館昌其流乃有祕宇殊庭瑶臺金牓散布寰宇幾與五城十二楼俱高不特鍊汞烹鈆以蘄沖舉聲金振玉以迓禎祥而鳧舄凌風翠旌導月往往薄游其間使夫志士辭榮貪夫棄慢頓悟有身之患樂皈衆妙之門豈非移風易俗之大樞機尊道貴德之大條貫哉道經載四海之内凡大小洞天四十有六福地七十有二而洞霄咸有一焉舊志以爲與嵩山崇福獨爲天下宫觀稱首地望之重他莫敢比信矣天造地設者固不以人力爲消長然歷代崇奉之制不可無傳也洞霄宫兹山爲大滌玄蓋洞天天柱福地在杭州餘杭縣南一十八里郡志云漢武帝元封三年始建宫壇於大滌洞前投龍簡爲祈福之所經今一千五百餘年矣唐高宗弘道元年本山潘先生奉勑面南建天柱觀四維壁封千步禁樵採爲長生之林中宗朝賜觀莊一所後有朱法師改北向乾寧二年錢武肅王與閭丘先生相度山勢復改爲甲向今宫基是光化二年録圖表奏詔㫖褒嘉見天柱觀記錢氏納土時嘗改天柱宫宋眞宗祥符五年因陳文惠公堯佐奏改洞霄宫賜仁和縣田一十五頃悉蠲租稅並賜鐘罄法具等歲度童行一人應天慶等節設醮本州應辦支費青詞朱表學士院撰進呈訖内降修奉仁宗天聖四年詔道院詳定天下名山洞府凡二十處杭州洞霄宫大滌洞爲第五仍命每歲投龍簡遇祈禱封降御香遣中使或郞官入山政和二年住持都監何士昭以宫宇頽圮詣汴京陳乞奉㫖賜度牒三百道兩淛轉運司經理後因方臘之變廢于兵火高宗南渡紹興二十五年發帑出金重建昊天殿于東廡後殿左闢通明館本宫住持兼領焚修于此孝宗乾道二年三月德壽太上皇洎顯仁皇太后臨幸慶成遇庚申甲子聖節帝后本命係朝廷請降設醮本宫書記撰青詞奏呈修奉官差軍士守衛後奏罷軍士以山麓之民充佃火防虞理宗淳祐七年靈濟通眞先生孫處道奏請賜錢益市恒産以禆贍用由是山門規制愈崇廣矣政和間援唐天柱觀例經尚書禮部給洞霄宫印記寧宗慶元二年知宫陳以明以歲乆漫滅重給宋國初聖節道場應奉本縣文武官僚入山建散諸山僧咸至立班自南渡後惟道士就本宫建散而縣官止於普救寺行事凡宰執大丐丐閑去位者以提舉臨安府洞霄宫繫銜咸淳甲戌冬防虞弗憤延燎一空至元丙子後重建未完復燬于甲申之夏今自甲申後再新宫宇規模視昔愈壯專一爲國焚修告天祝壽每遇天壽聖節道場依例就宫建散蒙管領江南諸路道教所總攝江淮荆襄等路道教所以名山事實聞奏至元十八年欽奉聖㫖護持山門至元二十三年十一月欽奉聖㫖護持及本山諸宫觀元貞元年元貞二年大德三年節次奉宣命授本宫住持提點及提舉知宫兼管本山諸宫觀事大德八年六月又欽奉護持及諸宫觀蒙中書禮部鑄給杭州路洞霄宫提點所印信宇内名山自五嶽之外所謂天有八柱而已其五在方外既不可考今見於中國者三而洞霄之盛爲歷代所崇奉幾與五嶽俱尊又非舒州壽陽所可企及豈偶然者故列叙于篇首通眞門兹門不在餘杭縣四門數内宋紹興年間建謂由此入洞霄也至元年間重建先是宋淳祐間住山貝大欽買石甃路夾樹林木一十八里至九鎖山門九鎖山門在九鎖山外未至宫三里扁九鎖山三大篆字甚奇古程俱書外門衝九鎖山大路道龍鳳二洞直上爲棲眞洞路自路口折入會仙橋過翠蛟亭左右厓石夾道勢若雙闕門眞其會扁洞天福地宋理宗淳祐七年賜書雙牌門自外門入度玄同橋兩門對峙左篆天柱泉有池有焉右篆大滌洞洞所從入也三門宋紹興三十二年内帑賜錢造至元戊寅山隱齋建癸巳年本齋重建仍造天香亭于後故所無也虚皇壇在正殿前舊志云唐景福二年錢武肅王按當時儀式疊甃開壇請閭丘先生三元奏籙于此大德庚子增修廣之三清殿即郭眞君結茅之地殿前三松其所手植今不存矣錢王遷坐庚向甲蓋指此也宋政和間方臘之變惟徽宗本命殿獨存住持道士金致一奏㫖改爲三清殿聖像乃汴京孟成忠所塑號爲絶技至元庚寅復建壯麗殆過於昔有桂柏相間列峙前向昊天閣在東廡後宋紹興二十五年内帑賜錢造殿大德辛丑重建爲閣四山環抱最爲登覽勝處璇璣殿在庫院東建炎間建至元辛巳迴紫齋建佑聖殿舊在正殿左建炎間建至元辛巳怡雲齋建于三門東偏祠山張帝祠舊在宫門外西阜開禧間内庭賜神像及左右侍從景定間移建三門右至元庚辰壺隱齋建辛卯本齋重建龍王仙官祠在西廡後宋建炎間建賜額嘉應廟至元壬午清虚齋建今洞天福地二仙官併祠于此從古制也祠下撫掌泉與大滌泉源通俱號龍井初以宋紹興九年内㫖詣洞投鐵簡得雨封善應侯勑朕惟山林川谷出雲氣爲風雨者必加禮秩以謹奉詞矧兹洞天神靈所宅屈伸變化呼吸風雲若時愆陽旋施膏澤有司言狀寵錫侯封用孚惠於烝黎以欽承於涣綍可特封善應侯慶元三年加封善應靈濟侯嘉泰元年加封善應靈濟昭貺侯端平三年加封善應靈濟昭貺廣福侯又特封靈澤公雲堂在西廡後延接十方雲水宋淳祐咸祐間高道雲會相傳爲口實今南北高士來游來居亦不减於昔日也旦過寮在雲堂右雲遊僧暫憩之地諸亭曰翠蛟曰飛玉曰清音曰翠微曰採芝曰九曲見山水門曰谷口曰石室見洞府門曰祥光曰宜霜曰聚仙見古跡門白鹿山房在石室頂先是陸永仲嘗家石室東偏因爲道院宋妙行修鍊其地凡二十年尸解去是後有天目阮先生居之有泉州陳道士者縁山屈曲開逕結茅相依發土得奇石甚多一帶凡百餘步狀如步障中更兵火阮陳亦亡去大德甲辰建山房于此有記廨院二所一在餘杭縣西南半里大溪之上後唐長興四年建名天柱廨院宋咸淳年間重修門前有梓林夏日陰翳可愛在三門東偏法堂在正殿後宋開禧元年内帑賜錢造寧宗賜書演教堂扁至元乙酉重建左右兩石天造地設後有蒼崖橫峙因加人力疊成峰巒中作小洞洞中小路委曲出登其絶方丈在演教堂後庫院在東廡至元乙酉重建丹泉流注其間唐李玄卿所記新池在焉齋堂在西廡大德戊戌重建道院在西廡後古有三院曰上清曰精思曰南陵今分爲十有八齋中瞰一池諸齋環嚮池水盈涸往往亦關休咎左廡七齋曰山隱曰山素曰岫隱曰嵩隱曰怡雲曰粟隱則上清院派曰迴紫則南陵院派右廡四齋曰清隱曰谷隱曰盤隱則上清院派曰清虚則南陵院派正面七齋曰壼隱曰橘隱曰悠然曰閑隱曰學隱則上清院派曰怡然曰碧壼則精思院派選道堂在西廡後至元乙酉年重建至道宫在餘杭縣北三十里曹橋西唐文明元年建初名福業觀潘尊師成道于此雲笈所載者宋治平三年改今額前有古松一圍兩合抱後有苦杏二大與松埒鷺鸛巢集其上厨院有宋熙寧間所鑄巨鑊四畔識歲月及施錢姓氏隱士葉玄文詩云猶存巨鑊記熙豐翠靄春深古路通千百春鋤一株樹野田飛下雪花風龍德通仙宫在餘杭縣市南南唐文懿趙公汝談嘗卜居于此至元癸未住山郞如山愛其溪山之勝罄己資更宫宇一新花木亭池冠於一時天師演道靈應冲和玄靜眞君爲書宫額元清宫在臨安縣錦南鄉地名新路住山舒元一故廬所在至元甲午即其地建宫樓閣巍峨山水環抱視爲甲觀冲天觀在九鎖山門外東天柱山所止先是宋咸淳間住山龔文焕建于德清之青坡至元壬午知宫事周允和更建此處今住山沈多福疏鑿泉石栽植松梅頗有徜祥登眺之趣有記錢塘葉玄文隱于是二十年大德丙午正月成道仙去洞晨觀在餘杭縣東郭河上安樂山東爲陳季卿故址季卿餘杭人世傳遇終南山仙翁以竹葉爲舟者宋景定癸亥住山貝大欽建松行掩映流水迴環植梅一塢扁無盡春先是接待最盛有記元陽觀在天柱步南三里大滌山後宋咸淳間住山吴處仁建至元辛巳改向重興山深林密門徑瀟然頗有塵外意但游者罕至焉冲眞觀在湖州路長興州晋葛仙翁鍊丹之地宋咸淳間本宫道士周國壽以古額興建至元甲午住持周貴生修蓋一新周迴流水松行古檜老桂爲佳翫焉龍德觀在嘉興路澈浦鎭宋景定間本宫道士劉應善建與海涯相接爲士民祈禱之便玄同觀在杭州城癸辛街先是楊府瞰碧園有蘭亭茂林脩竹之趣至元癸巳住山郞如山建道院大德辛丑改爲玄同觀明星宫在餘杭縣東二里明星凟之上至元辛卯本宫道士史得芳建道院曰來清大德丙午改明星宫洞陽觀在台州寧海縣東隅大德癸卯本宫道士楊應世買張氏宅改建岳祠道院在餘杭縣南湖之上先是爲土人聞武功圃後施地建祠遥望西溪諸山森然拱立祠旁小阜曰鳳凰山以形似名巨石林立流水周旋幾百餘折葛仙翁丹竈據其上下可羅坐數人有亭臨流對之今建道院于祠右扁名鳳山道院清眞道院在東天柱嶺青檀山之陽宋咸淳間知宫事朱特立建泉石清勝可觀凝眞道院在九鎖外墓塢至元壬午本宫道士姚崇道自城居移建于此若虚道院在餘杭縣市西舊爲沃氏居至元戊子住山曹至堅得其地建院通明道院在餘杭縣相塢至元己丑本宫道士金自吉建爲奉先報本之處益清道院在臨安縣地名後洪至元壬午本宫道士何自清建紫清庵在上塢青梓隴山下至元乙酉本宫道士徐允熙建碧壼庵在李塢石玉山下宋咸淳間副宫李元綱建溪山庵在天柱步大德丁酉副宫金常清建閑隱庵在來賢岩後青山下至元己丑本宫道士王允升建學院庵在天柱嶺西至元辛卯本宫道士陸繼脩建太平庵在臨安縣大德甲辰道士徐元英建集虚書院在餘杭縣東五里碧塘福地有巨井一所世傳葛仙翁鍊丹于此元貞丙申道士孟宗寳建院爲游居講習之處翰林學士張伯淳書扁隱士鄧牧心作記紫陽山方回詩云天地春藏凍核中時來蜂蝶鬨東風萬端變化根無極一點靈明褁太空妙處千江分朗月飄然六合點冥鴻守玄知嘿交龍虎肯泥丹爐子午紅錢塘仇山村詩云築舍東臯野水濱室中生白座生春了知空洞元無物須信清明自有神幽經草花聊適趣閑窗筆硯不留塵酒經丹訣非吾事萬卷書藏一老身大滌洞天記卷上
