front:
  text: 大滌洞天記卷中當七
  hash: sha256:4d43ed94d29c8aeef9d3cd472916e7fcd5327498ba9d39432e73bdb90b73db37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0179_HFL_002-001a, image: hfl/0559/0559-088.png}
body:
  text: 本山鄧牧心編敍山水浙右山水之勝莫如杭杭山水之勝莫如天目天目之勝未知大滌洞天蓋大滌山水發源天目風氣盤礴岡巒紏纏相望幾百里然後藴靈育秀於此經以苕川之紆餘匯以南湖之蕩莽九鎖外鍵一柱中擎豈非天地之奇觀仙靈之奧區哉郡志載登天目山憑天壇石屋見山皆西南馳雙溪並趍而合于於潜縣岝崿似少駐回望天目層雲中如沈雄古大將按轡其後大勢不可遏少决驟已抵臨安縣大官山者直培塿爾循而至九鎖蓋為罦罳環以天柱諸峰若止息者已而矗矗赴餘杭下武林北高峰而特起為南高峰揵以八蟠慈雲嶺翼為七寶鳳凰山昂頭妥尾若翔而集前界大江乃止吁亦異矣杭之山川大較以是觀之兹實録也天目山太平寰宇記云天目山高三千九百丈周五百五十里多美石甘泉有數百年古木山上兩湖若左右目故名古有東山銘略曰列嶽霞上標峰霧裏翠滴煙巒名不可紀有蛟龍池上中下三潭源脉相接徐伍仙故居在石室峰西又漢天師舉家於此上升兹蓋天柱之鼻祖而錢塘所謂龍飛鳳舞又其雲仍也黃山在宫西北是山最高為衆山之祖雖百里外亦望見之左發為大滌右發為天柱其趾長水灣伏虎岩在焉九鎖山自餘杭西郭外行十有八里逆溪水上左右合七峰皆拔地數百尺其趾犬牙相錯行路並溪屈折者九故云九鎖好事者悉命以名一曰天關二曰藏雲三曰飛鸞四曰凌虛五曰通真六曰龍呤七曰洞微八曰雲璈九曰朝元大滌山在宫北凡四峰於九鎖內最為巨山西洞據其領石室出其半天壇冠其顚皆山中勝處也是山以洞名之舊志謂大可以洗滌塵心故名大滌雖山川得名未必咸有說而故老相傳當不誣也玄同先生劍履瘞山下天柱山在宫西南凡三峰與大滌對峙高足相敵由宫外望之屹然若柱又絶頂有石柱高丈餘圍兩合抱此山所以名者蓋五十七福地地仙王伯元主之按傳記所載天有八柱其三在中國一在舒州一在壽陽洎今在餘杭者是已洞霄以為主山故古名天柱觀舊志以為風清氣和土腴泉潔神蛇不螫猛獸能馴自漢武標顯靈跡建立宫壇歷代祈禳皆在此處也乳山即宫前案山錢氏所增培者香爐山在宫前乳山後其峰甚鋭青檀山在宫東南東天柱右偏其勢不甚高而泉石奇秀為諸山甲今湧翠石壁與試劍來賢二岩冰壼鏡潭皆在此青梓山在宫西黃山跡狀如屏嶂與白鹿山對其地平處即上塢青苕山在宫西青梓山下東連上塢路西達棲真洞白鹿山在大滌山即今中峰是因許真君上升於此天降白鹿下迎故名丹山在黃山外極高廣綿亘十餘里楊村在其下後有響水石溪流至此輒逢逢有聲紫竹塢在青梓山西古多紫竹故名苦竹塢在東天柱嶺首去宫一里許與仙跡岩相並狀如片雲從地湧出欲飛而未起也苕溪山海經云天目山一名浮玉苕溪出焉今由於潜臨安縣界經餘杭及錢塘界然後入湖州達于震澤郡志以為夾岸多苕花每秋風飄散水上飛雪然因名苕溪又輿地志云自餘杭西亦名泠溪溪兩涘有琴鶴翁姥四山皆有居民在其下今自宫抵溪口五里名天柱步道旁有井亦名天柱泉蓋柱流泉循九鎖山東行達是溪也南湖此湖每歲梅雨苕水盛時必聚此而後泄于大溪長堤小橋出其髣佛類杭西湖餘時皆涸彌望豐草而已丹泉一名天柱泉是泉發最高歷天柱山半初但聞有聲殷殷若雷至大滌洞西百餘步始出地上既清且甘大旱不竭有方池瀦焉天宇清明而有赤光四旁苔蘚時作紫暈東坡詩云一庵間寄洞霄宫井有丹砂水常赤故扁丹泉亭曰清音取左太冲山水有清音之句除引供厨堂及十八齊之外一境田疇咸仰灌溉厨院方池唐大曆五年令尹范公愔俯見泉脉浸潤命鑿池以便庖厨李玄卿有記三池在洞天福地門裏路左二路右一若品字然唐乾寧年間錢武肅王開鑿由大滌洞前疊石為暗溪約里許接天柱流泉瀦畜其中澄徹可愛於池口復為暗溪曲折五六深合地理翠蛟亭宋高宗臨幸步月至此愛之賜錢造水閣在宫門外三十餘步自門內三池流注入澗撤池上一二板汹湧若雷變化飛舞山林蔭映作紺碧色故扁翠蛟取坡仙詩亭下流泉翠蛟舞之句仍奉坡像祠事于後亭前有坡羅列坐石游者必登憩焉冷泉在宫門外會仙橋之東路旁石罅間泉脉甚微四時不絶行者掬取飲之寒勝冰雪故名桃花泉在龍洞西數十步其泉自石罅橫注入溪昔人每見有桃花片流出莫知從來故名石門自來賢岩東五十餘步歷坡陀而上即青檀山路右依岩石左臨深坎旁有巨石與岩對峙號小石門月窟泂酌之旁有巨石圓竅玲瓏廣二尺許深五六尺許曰月窟冰壼月窟之西有石竇貯泉甚寒而甘曰冰壼鏡潭泂酌之下有石竇其泉清可鑒物曰鏡潭試劍若自來賢東行可二百餘步有石裂為兩如劍所斷故名湧翠石壁自試劍岩復三十餘步有峭壁面北從地湧起高可一二丈廣二三十丈其上蒼翠玲瓏奇怪萬狀莫可形容蓋兹山秀氣發自來賢至此餘半里始盡呈露上有石乳焚之芳香有岩對峙相去僅數尺不容並行若以人力開闢尚可作亭盡意觀覽爾今外向有亭曰翠微石步障自石室歷數折上有蒼石沿徑聯屬可百餘步名石步障通仙橋在餘杭入宫大路去通真門四里宋建炎年間建舊號石門橋大德己亥八月知宫事楊清一重建道士橋與通仙橋相去半里者本宫祖師建咸呼為道士橋朝元橋在宫外四里由天柱步入宫大路俗呼為湖塘橋咸淳癸酉增構高廣名為朝元橋雙仙橋在宫外三里俗呼為雙橋頭昔郭真君與葛仙翁倚仗對談于此故名玉泉橋在東天柱嶺下石府君祠左去宫二里俗呼麻車橋宋建炎間建飛玉泉由此出澗故名鳴鳳橋在雲根石左俗呼袁家橋宋建炎間建與鳴鳳岩相近故名會仙橋在棲真洞牌門前入宫大路跨澗為橋宋淳熙甲辰道士江安著以早游湖海晚歲歸隱山中捨衣鉢錢重造玄同橋在洞天福地門裏下通池水出翠蛟亭昔玄同先生與錢武肅王相度地理鑿池架橋故名敍洞府神仙安在哉列子載渤海有五神山東方曼倩云有十洲嘗所涉歷弱水三十萬里既不勝舟而珠樹琪林瓊樓寶闕又非結駟所及何怪世俗不信以為荒唐詭誕之言哉然則三十六洞天具在域中其為神仙之居信邪否邪日月周行中天下入滄海晝夜相禪而不息雷霆發虛空中赫然有聲萬物震動使世俗未嘗聞見而吾言之又肯信乎一介之士苟有遐心尚將逃深林隱空谷渺焉不與世接而沉龍變蟬蛻飲露餐風其去塵土之腥螻入煙霞之杳靄必然無疑者是四海內外不可謂無兹洞不可謂無若人也若青城羅浮武夷句曲向使不名洞天吾知為仙聖區委羽塊然山爾陽明直數仞之石裂一線爾亦得以洞天名而青童君仙人郭君各理一焉豈飛行變化之跡無往不到邪玄蓋在大滌山而雲笈云在天目山者豈以大滌為天目子孫或古人著書未必皆親履其地失於審稽雖信史不免無足異也大滌洞在宫西北半里茅君傳云第三十四洞天名大滌玄蓋之天周回四百里內有日月分精金堂玉室仙官校灾福之所姜真人主之與華陽林屋邃道暗通相傳洞玄先生入游見龍麟異境花木鮮繁自華陽而歸洞門石鼓廣可尋丈扣之逢逢有聲自此上下皆平如剗削兩旁崖石委曲夾道中間一石若柱倒懸因以隔凡名之過柱一穴如竇內闊丈餘中有圓井無底惟聞浪浪水聲乃歷代朝廷遣使投龍璧之處也棲真洞在大滌山前西天柱嶺上去宫三里一名西洞舊志云大滌先生杜琛語弟子何法仁曰汝宜居西洞可以遁世成真遂名棲真洞天生罳頂狀若寶蓋龕室幽深乳泉滴瀝又東西二臺石閣崖上有龍爪蟠拏蹴蹜之跡或戲以手漫滅翌日視驗如初是知洞龍出入之徑也西臺一石平如棋局白石子如拳委積其上旁列石坐環嚮焉入洞門三丈許有石仙人為仰卧狀又越華蓋西有石龕可容數人石室洞兹洞一名藏書一名東玲瓏在大滌山中峰前白鹿山下洞中三亢若品字透見天日門有石梁橫界泉脉涓涓注石梁下引而瀦之可供十餘人居者賴之相傳郭真君登山採藥嘗濯于此名洗藥泉郡志云吳天師筠修鍊之所天師既尸解於宣城指令門人藏書劍於此洞有石室故以名之又景行録載天師云當遷神于天柱石室蓋太上俾我煉蛻之處故卜其西麓果有石坐岩扉自然成備如是則不惟書劍亦天師藏真焉按石精金光經言曲晨飛精藏景録神劍解之道凡暫過太陰紫胞煉度四百年所藏必發蓋數足運會其靈自有以發之耳舊志謂天師石室之藏岩扉呀啓信也山腰有石窪樽石茶竈皆仙家之遺跡白茅洞在宫山西南十里嶺右靈迹巋然按記云晋人遇一道士衣巾爽麗自洞中出詢所自來曰吾白茅先生職此久矣因名之其門如井縋綆而下一二丈至平地可環坐二十人復偃身下入又二丈許有仙人酒瓮石及石柱二一竅上徹天光境界奇絶第山高路阻希有至者爾鳴鳳洞在宫外一里道旁山上雖石門阻隘有童稚可入云其間廣埒兩屋旁一小路不知所極上有冗泉流為丁當音下入方池未嘗减溢耆舊云錢氏時因鳳凰來鳴故以名洞其地亦改為靈鳳鄉蛻龍洞在鳴鳳洞相對山崖中相去百步許喬木幽隱岩亢嵌巉深可數丈宋皇祐初羽人於洞間獲龍蛻骨齒角皆具故名記云五洞潜通此其一也歸雲洞去宫五里在棲真洞左偏半里許即棲真之後門深可百餘尺石壁光瑩洞有罳頂亞於前洞按記云是神仙回車之便道故曰歸雲洞門僅數尺下入丈許石皆如瑪瑙五色紋理旋雲飛霞直下方池深不盈尺廣可二尺長可三尺池底白色如纍珠鏤玉可愛泉水則盈涸不常又下十數步有白石若瓠者三又下數步左偏上陟則有石盆其上流泉涓涓下入盆內可以盥四周石乳如垂瓔珞復返右偏直下十四五步闊二丈許其中有石如積銅錢者周圍平坦可容三十餘人敍古跡人事有代謝山川無古今生身千歲之下游心千歲之上登箕山而懷洗耳之風弔首陽而悲餓死之節利害既不相及影響既不相知而田夫野老樵童牧竪猶將躑躅悲歌有泚其顙況高世絶俗慷慨之士哉千萬世同一理千萬人同一心古人遠矣九京不可作矣一旦過其隱遁之地觀其游息之所有不浩然興起如親炙之者乎馴虎岩之坎木無恙升天壇之丹竈未寒空山無人渺渺愁豫豈晋人所能今人不復能邪山中陳迹時有足稽併採異聞附見一二漢宫壇在大滌洞前漢武帝元封三年所創今其址不可考矣升天壇舊志云升天壇在山中峰之上又名法象壇上應天而圓下應地而方中應易卦而八角許遠游真君精研洞典登其上而仙去時天降白鹿下迎故中峰名白鹿山今山頂界松內數丈之地草木弗殖是其遺址也宋政和間猶有卿雲簫吹往來伏虎岩在宫山西南峻壁間若環堵之室南有路自上而下復陟崖磴方至其所藤蘿深密怪禽晝啼非有道之士不可處也昔郭真君伏虎於此按晋書云葛洪何幼道偕訪之目擊而已各無所言引嘯而退唐吳天師愛其遺跡每游忘返題詩岩上今歲久昏剝云郭生在童稚已得方外心絶迹遺世務栖真入長林元和感異類猛獸懷德音不憶固無情斯言微且深末句蓋引真君與溫嶠問答語仙跡岩去宫一里在行路隔溪崖石上按記云秦始皇驅山嶽擬塞東溟嘗役鬼移之山勢欲動勿有仙人叱鬼以身扼崖石使不得去今崖上有肩帔簪冠隱然遺跡溫潤光澤苔蘚不生以手摩拭良久作古桂香云楊傑有詩曰祖龍求仙徒用力駕海欲驅山下石神人倚住不與行留得岩前隱仙跡來賢岩在宫東南青檀山前嵌空數丈盤石藂竹可以游息宋熙寧間東坡居士為杭通守與蔡準吳天常樂富國聞人安道俞康直張日華皆幅巾藜杖盤桓于此東坡賦詩云上帝高居愍世頑故留瓊館在凡間青山九鎖不易到作者七人相對間庭下流泉翠蛟舞洞中飛鼠白鴉翻長松怪石宜霜鬢不用金丹苦駐顔後人名岩來賢作亭其上曰宜霜石室唐吳天師瘞書劍地宋陸維之朱妙行居焉撫掌泉在宫內龍祠下深僅三尺清泠可鑿古詩云却疑三尺底别是一壼天其泉五色變易不常每一變則有吉事餘杭圖經載錢武肅王至宫有雙鶴飛舞其上因撫掌招之鶴墜而泉湧漕使陳堯佐因按察至焉問羽士所以名泉之意答曰昔仙人撫掌而泉湧公於是撫掌亦然吳天師觀碣云水旱不易縈照軒宇夏寒而辨沙礫冬溫而冒萍藻宋熙寧初有物狀如鰻繞欄楯間兩目如丹時人以杖朴之即墜入泉去須臾陰霧周布一山大水自天柱源來汹湧可畏將墊殿堂乃止或龍之怒也今環甃以石結亭覆其上圍以朱欄者宋高宗嘗酌之也明星瀆餘杭圖經云在縣東十里二百步周回一百五十步溪之南塘歷朝勑使投龍簡於天柱大滌洞必先祭明星瀆九域志載餘杭古迹亦然父老相傳云昔有人晝見星燦然故名溪下多潭皆遇水决衝而成自新堰以西第三潭最深瑩而闊者是也父老云瀆之南瀕路舊有道家居遺址尚存今地屬本宫建宫亦曰明星藥圃在來賢岩宜霜亭下夏侯天師種藥於此芝畦木塢百藥之植靡所不有常施藥於廛市隨緣深淺而與之一日樵者聞圃內有物大嘷隔籬窺見天師策鞭乘一獸似虎非虎行疾如風入東山而去今四山産藥草六十餘種圃跡猶存葉天師講堂舊志載在山門外天師役鬼神所建制度宏巧絶不類常工開元中天師講道德度人諸經於此有仙花靈鶴自天而下吳越高士輻凑聽法咸有所悟願居弟子列者三百餘人惟語以濟恤孤貧感愧覆載忠孝君親重人性命淨身心絶奢侈即為道家之根緒也荐經兵火遺跡不存今移宫中為演教堂草堂錢氏所創唐昭宗景祐二年武肅王以居閭丘先生既而旬旦入山問道每三元開壇授法籙號上清壇御史中丞羅隱皆入室者也堂外環列雲房為志人弟子栖息之所朝暮入室退即閉關下惟或持經或論道或鍊神修真各有所至今道院上清流派所自出也晝樓一名垂象樓暨天師所居天師少好經史著述不輟其中卷秩委積左右常晝採日魂夜飲月魄蓋紫文之上道也東西壁各置一竅僅可容面是採鍊之户白元鑒有詩其址亦在今道院內為精思流派南陵亦今之道院址因許真君居宫北之大滌山既而升舉預報南陵知己曰來日上朝玉帝矣至期登陵北望果見彩雲滿空真君乘白鹿冉冉而去故名此地為南陵今别為流派也七閩道士王介詩云飄飄遺鶴去尋真野客重來嘆復呤許邁林中丹竈冷郭文山上白雲深南陵事古都非昔北嶺歸期直到今珍重玉京無限意待將功節養高岑嘷亭在餘杭縣南五里晋郭真君居大滌山常出市肆貨藥有虎自隨令伏此歸晚則虎嘷故曰嘷亭今山下澗石奇怪流水潺湲是也聚仙亭舊志云其基爽塏為天柱峰之乳俯瞰宫中最為清勝玄同先生創亭占氣于此乾寧間衆聞亭上環珮之聲異香逆鼻走報先生先生曰洞天仙官朝謁北辰今夕百靈聽講上請大法來至是亭爾因名聚仙陳丞相堯叟詩云古檜森羅燒藥竈綵雲飄灑聚仙亭祥光亭在大滌洞口錢武肅王微時卧巨石上指洞曰余異日富貴當建亭覆此石及貴作亭營飾甚盛而瘞石亭下樵夫聞見有仙人奕棋亭上迫之則失所在祥符五年中使白公漕使陳公及州縣官皆至天氣澄徹了無纖翳方秉爐炷香忽有五色雲自洞中出上亘霄漢下瀰漫林麓時羽人從騎皆在雲氣中若仙官之朝玉京也數刻方散表奏其事名亭曰祥光今扁大滌洞天通明館在昊天殿左宋高宗臨幸寢食于此几榻咸在後樓宜縱目看山神應鍾舊志唐大曆四年台州黃岩大旱遍禱弗應遂祈于杭之大滌洞既雨土神見夢于邑大夫曰宜鑄金為鍾以酬厥貺大夫從之逮宋宣和間更三百六十餘年毁于火紹興八年道士周希及等收拾破壞且將復鑄禱之神則曰治于故地乃成不得已從之明年鍾成赤城左璠銘曰壞于數匪壞于火成于神匪成于人作于此用于彼福吾邑無有已故號神應鍾西洞神光宋紹定辛卯有楊公伯嵒者武恭王之孫游山至棲真洞方舉火仰視華蓋忽有神光發層臺上青白相半冉冉而升圓如滿月久之方隱公嗟異留詩山中有東臺仙子許參玄滿月光明現大千句道士王思明嘗立石識其事松花石凡兩株在璇璣殿前今不存重榮木餘杭圖經載宫外有大櫟木相傳唐咸通二年吳天師所種至宋咸平元年無故自枯歷十五年祥符壬子復榮漕使陳公堯佐異之圖狀進呈併奏五色雲現及地湧泉事尋降旨設醮以褒神異故改洞霄宫後熙寧三年五月一夕風雷大震不知是木所之人以為靈化焉無骨箬宫山周回百里多生紺箬昔晋許遠游真君上升語弟子曰吾有金丹十劑汝等功行未圖非可遽服已藏山中無骨箬下他日有緣者遇爾後役夫採薪或帶箬歸往往臨爨得之採時不見無骨者有好事者攀緣幽討終年不得蓋仙人所藏非宿生緣契不可幸致搗藥禽禽止有二伏藏深樹間夜鳴達曙宛然搗藥聲晝夜間鳴第見人則遠去故無識者石香鼎宋學士陳公堯佐授外臺日謂道士馮德之曰嘗夢游名山見仙人以鼎鼐相期何敢過望馮曰學士人望所歸名列仙籍世間富貴何足相浼後果大用造紫石巨鼎二置祥光亭上其一銘曰爐之質刳中起煙人之體虛心養元不用之用自然而然爐兮人兮兹謂道焉其二銘曰山之高兮巉巉出雲洞之深兮幽幽宅真鸞鶴一瞬鳧鷖百春安得而往葆光嗇神四山界松宋淳熙三年知宫章居中凡宫山岡阜與民接者悉樹以松親董工役既成春秋二時每指引後進登山以識疆界今四山虬枝龍形環列森立圍皆丈許其經始培植之功不可泯也應夢游詩宋元豐己未趙清獻公抃再帥錢塘抗章告老歲甲子八月忽來游山謂道士沈日益曰近夢入真境宫闕巍峨有數道士相迓詢之曰此洞霄宫既覺思之兩典是郡未嘗至此故冒暑來今觀泉石樓觀與夢中所見無異豈仙聖有緣邪留詩曰龍冗藏身穩泉源撫掌清紅塵人絶離白日世長生我分譜冲寂誰能顧利名夢中休指笑又作洞霄行陳文惠公書字宋祥符壬子陳文惠公堯佐典領漕職時表奏興修宫宇改宫額奉㫖書勑賜洞霄之宫六字誦度人經餘杭圖經載洞霄宫主首道士誦度人經多著奇驗每就所居側龍潭上持念一日有老人從潭中出跪曰弟子即龍王也每聽經文無任皈仰今竊有請焉師才到潭上則幽只皆起敬不退殊不自安願只宴坐齊中不妨日課百靈得以休息當日置仙鮮乳二斤以供齊饎道士許諾明旦厨人報几案間得乳鮮潔莫知從來果重二斤後日日常然居數歲忽纍日不至心疑之偶至水次復見前老人曰乳乃世間物弟子無有第忝為土神凡世間欺人取嬴者得陰攝之此去有市户董七好舞稱權以十四兩作斤故從而掠焉今其人不在厥父自主店業未嘗罔利故不可取非失約也道士嗟嘆每宣言村落間導人為善鄉老至今能言但忘其姓名及歲月耳大滌洞天記卷中
