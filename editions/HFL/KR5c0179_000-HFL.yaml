front:
  text: 大滌洞天記序當六淛之爲郡山川雄秀甲於東南故爲吾道之奥區而所謂洞天福地者在在有焉予過錢塘之上每低佪延覽不能捨去惜不盡遊其名勝者間讀予友大章徐先生所序杭之洞霄宫歸一規者尤慕其山水之麗宫宇之宏而未之一造焉今年春其宫道士杲持其宫志請序於予因獲探其源委顚末其大滌洞天天柱峰即洞霄宫也始漢武元封間而晋唐以來修眞隱遁之士多居之逮宋南渡都於杭則門地之盛聲望之隆與玉清醴泉崇福昭應太液寳籙諸宫觀等矣凡寵書幸駕錫田賜額之異尤冠一時涉元之盛高人奇士輩出於教益振雖宫宇之變或罹兵燹之革輸賦之繁復設規以守其成益有復興之漸矣而山川之推爲洞天福地之殊者四方至今猶稱之故其具諸載籍者凡殿廡之盛人物之異文辭之偉靡不備見之若淛之名於東南者舍是尚何求哉昔之志夫是者可謂善述其事張大其跡也今杲尤將廣于梓亦抑知繼夫先志也嗟乎古今之盛衰興廢之無窮雖僊眞靈異幻化之跡尤有湮没而無所考焉其所可追索者徒賴于名辭巨筆垂之金石焕乎千百載而不泯也雖然浙之地勝人傑而琳宫璿宇卓稱於時者爲不少矣而能託於不泯之言者又幾何哉若洞霄之稱於一時而文且著於不朽矣使其傳之悠遠與三山之書並行而不已豈不亦吾道之盛典也因嘉其志而序首焉洪武三十一年歲在戊寅正月既望正一嗣教道合無爲闡祖光範眞人領道教事四十三代天師張宇初序大德九年夏予奉㫖搜賢知葉玄文鄧牧心隱餘杭天柱山即而徵之固辭不起因得極山中奇偉絶特之觀後六年代祀南來道士孟集虚出所編洞霄圖記山川之奇秀嵒洞之深杳宫宇之沿革人物之挺特昔耳目之未及者今一覽無遺是編行乎世集虚於兹山之功亦懋矣況其賢而文沖澹不衒其師介石沈公端雅有容疊膺綸命典領本山人稱其懷山之洞天福地歷漢晋唐宋聞人世出今介石師友如淵珠山玉輝潤泉石信乎山川之勝亦繫乎其人凡居者游者苟不潔涓身心悠遵太上清靜之教嚴釐祝弘至道以重兹山是增林慚澗媿負介石師友之心事予併發之於是乎書至大三年六月旦日玄教嗣師吴全節序夫誌書者所以叙事物之源委本末名數凡目靡不登載故貴乎廣記備言使往者有傳來者有徵也大滌天柱爲東南一大勝槩其可紀者不少而宋政和間唐子霞作眞境録已不可考端平間所輯亦復疏略余懼靈跡奇聞乆將湮没遂俾道士孟宗寳隱士鄧牧心相與蒐羅舊籍詢咨故老考訂作洞霄圖志凡山川標致之勝宫館規制之詳仙聖遊化之跡英賢紀述之美皆收拾而無遺非但游息於斯洞見今古而足跡未能至者一睹此志便眇眇然如行翠蛟白鹿間有頡頏飛霞之想亦滌心一助也時大德九年乙巳十一月望日大滌住山介石沈多福謹書
