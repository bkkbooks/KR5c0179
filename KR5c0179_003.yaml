body:
  text: 本山鄧牧心編敍碑記天柱觀記天柱觀者因山爲名按傳記所載皆云天有八柱其三在中國一在舒州二在壽陽洎今在餘杭者皆是也又按道經云天壤之内有十大洞天三十六小洞天如國家之有藩府郡縣遞相禀屬其洞天之内自有日月分精金堂玉室仙官主領考校灾祥今天柱山即眞誥所謂大滌洞天者也内有隧道暗通華陽林屋皆乗風馭景倏往忽來眞蹤杳冥非世俗所測而況大江之南地兼吴越其峰巒西按兩天眼之龍源次連石鏡之嵐袖東杭浙江之迢派可謂水清山秀兼通大海及諸國往還此外又有東天目西天目及天竺之號得非抗蒼涯於穹昊聳絶壁於雲霄立天爲名以標奇特耳若乃登高遠望則千巖萬壑金碧堆疊龍蟠虎踞靈粹滋孕代生異人非山秀地靈之所鍾襲其孰能與於此乎就中天柱風清氣和土腴泉潔神蛇不螫猛獸能馴自漢武帝酷好神仙標顯靈跡乃於洞口建立宫壇歷代祈禳悉在此處東晋有郭文舉先生得飛化之道隱居此山群虎來柔史籍具載乃於蝸廬之次手植三松虬偃鳳翹蒼翠千載今殿前者是也洎大唐創業以玄元皇帝爲祖宗崇尚玄風恢張道本天皇大帝握圖御宇授籙採符則有潘先生弘演眞源搜訪神境弘道元年奉勑創置天柱觀焉仍以四維之中壁封千步禁彼樵採爲長生之林中宗皇帝玉葉繼昌玄關愈闢特賜觀莊一所以給香燈於是臺殿乃似匪人工廊檻而皆疑化出星壇月砌具體而微則有被楬幽人據梧高士挹澄泉之味息青蘿之陰葉天師法善朱法師君緒吴天師筠暨天師齊物司馬天師承禎夏侯天師子雲皆繼踵雲根棲神物表骨騰金鎖名冠瑶編出爲帝王之師歸作神仙之侣金錯標宇翠珉流芳昭晰具存不俟詳録其餘三泉合派雙石開扉藥圃新池古壇書閣各有題品足爲耿光鏐此際蒙聖朝疊委藩閫綰闔閭之封略統勾踐之山河寵極蕭曹榮兼渾郭𥾝懷斯地實邇維桑素仰眞風備詳前事但以此觀創置之始本對南方後有朱法師相度地形改爲北向雖依山勢偏側洞門其洞首陰背陽作道宫而不可致左右崗瓏與地勢以相違背洞門而不順百靈使清泉却侵白虎致使觀中寥落難駐賢能皆爲尊殿背水激衝之所致也乾寧二年鏐因歷覽山源周遊洞府思報列聖九重之至德兼立三軍百姓之福庭於是齋醮之餘徧尋地理觀其尊殿基勢全無起發之由致道流困窮二時而不辦香燈竟歲而全無醮閲遂抗直表上聞聖聰請上清道士閭丘方遠與道衆三十餘人主張教跡每年春秋四季爲國焚修鏐特與創建殿堂兼移基址山勢有三峯兩乳兼許邁先生丹竈遺跡猶存遂乃添低作平减高爲下改爲甲向是五音第一之方而乃添培乳山却爲主案尋即一二年内法主兩霑渥恩道侣益臻常住咸備青牛白鹿堪眠琪樹之陰降節霓幢不絶星壇之上得不因移山勢而再振玄風者哉尋又續發薦章奏閭丘君道業聖上以仙源演慶眞派流輝方瑶水以遊神復華胥而入夢欲闡無爲之教欣聞有道之人勑賜法號爲妙有大師兼加命服雖寒栖帶索之士不尚寵榮在法橋勸善之門何妨顯赫其次畢法道士鄭茂章生自神州乆棲名嶽玄機契合負笈俱來鏐幸揖方瞳常留化竹副妙有大師三元八節齋醮同修福既薦於宗桃恩惠頗霑於軍俗尋發特表蒙鴻恩繼賜紫衣焚修於此其大殿之内塑天尊眞人龍虎二君侍衛無闕其次别創上清精思院爲朝眞念道之方建堂厨及陳鼎擊鍾之所門廊房砌無不更新天風每觸於庭除地籟時聞於窗户兼爲親蹤觀額以炫成功非矜八體之能貴立永年之志妙有大師閭丘君靈芝異禀皓鶴標奇誕德星躔披霓靈洞朝修虔懇科戒精嚴實紫府之表儀乃清都之輔弼加以降神之地即舒州之天柱山也遊方有志躡屩忘疲自生天柱之前駐修天柱之下察其符契信不徒然乃此修崇實同搜抉所謂道無不在代有其人爰自開基至于功畢備仙家之勝槩暢聖祖之眞風遂録畫圖封上進奉光化二年十一月二十七日詔㫖勑錢鏐省所奏進重修建天柱觀圖一面事具悉我國家襲慶仙源遊神道域普天之下靈跡甚多然自兵革荐興基址多毁沉兹幽邃豈暇修營卿考一境圖經知列聖崇奉親臨勝槩重葺仙居仍選精慤之流虔備焚修之禮冀承玄貺來祐昌期豈唯觀好事之方抑亦驗愛君之節既陳章奏披翫再三嘉歎無已想宜知悉冬寒卿比平安好遣書指不多及懿夫地出靈阜天開洞宫三皇之前眞聖非一莫匪乗虚躡景出有入無雖或掛於傳聞不可知其名氏皆分洞天而理即大滌居其一焉天柱觀晋漢已來迄于唐室修眞之士繼躡清塵當四方俶擾之時見一境希夷之趣今也仙宫嶽立高道雲屯六時而鐘磬無虚八節之修齋罔闕有以保國家之景祚福兩府之蒸黎鏐今統吴越之山河官超極品上奉宗社次及軍民莫不虔仰神靈遵行大道時也聖明當代四海皈依忝蒙委以東南封功臣兼頒金券家山衣錦秉兩道之油幢上承一人倚注之恩次乃是正眞護持之力玄元至聖崇敬福生大道眞科是無爲化致乃及身於此合刊貞石用俟後賢時光化三年七月十五日記定亂定國功臣鎭海鎭東兩軍節度使浙江東西等道觀察措置營田招討安撫等使兼兩浙鹽鐵制置發運使開府儀同三司檢校太師兼中書令使持節都督杭越等州諸軍事兼杭越兩州刺史上柱國彭城郡王食邑五千户食實封二百户錢鏐天柱觀碣太史公稱大荒之内名山五千其在中國有五嶽作鎭羅浮括蒼輩十山爲之佐命其餘不可詳載粤天柱之號潜霍及此三峯一稱矣蓋以其下擢地紀上承天維中函洞府之謂豈唯藴金碧宅靈仙所貴興雲雨潤萬物也自餘杭郭泝溪十里登陸而南弄潺湲入崢嶸幽徑窈窕纔越千步忽巖勢却倚襟領環揜而清宫闢焉於是傍訊有識稽諸實録乃知昔高士郭文舉創隱于兹以雲林爲家遂長往不復元和貫於異類猛獸爲之馴擾晋書逸人傳具紀其事可略而言自先生悶景潜昇而遺廟斯立暨我唐弘道元祀因廣仙跡爲天柱之觀有五洞相鄰得其名者謂之大滌雖寥邃莫測蓋與林屋華陽密通大帝陰宫耳爰有三泉二𣷾一濫殊源合派水旱不易擁爲曲池縈照軒宇夏寒而辨沙礫冬温而冒萍藻既漱而飲之曲肱而枕之樂在其中矣土無沮洳風不飄厲故棲遲者心暢而壽永磐礴紆奥氣淳境美虎不摶蛇不螫而況於人乎正觀初有許先生曰邁懷道就閑荐召不起後有道士張整葉法善朱君緒司馬子微暨齊物夏侯子雲皆爲高流或遊或居窮年忘返寳應中群冠蟻聚焚爇城邑蕩然煨燼唯此獨存非神靈扶持曷以臻是州牧相里造縣宰范愔化洽政成不嚴而理遺氓景附復輯其業筠與逸人李玄卿樂土是安捨此奚適恐將來君子靡昭厥由故覈而志之表此堅石大曆十三年正月十五日中嶽道士吴筠記厨院新池記遇知己而用者匪唯於人物亦有之初厨院因前池餘派浸潤坳堂數步及霤纔供厨飪滌器而已邑大夫順陽范愔跡累人群心在遐曠每休沐之暇訪道山林見其有天造池沼之形而隧爲溝竇乃命黄冠等頤指廣袤鑿周宇下駢石以涯之畜流以深之清瀾忽平秋陰滿院執爨無欲清之僕挈瓶無汲深之勞不造機事而功贍於物范公實所謂新池知己矣靜勝則道淳境幽則神王予與吴天師采眞洞府朝夕窺臨瑩徹心膽滑昏潜遁事苟愜於心則與登姑蘇望五湖而齊矣故因碑籀餘地刻石誌之猶詩人有泌泉之作大曆五年歲號閹茂八月一日處士李玄卿記洪鐘紀聖天子握符御極敬天愛民遇雨暘稍愆禱于群望所至感格其靈績寂彰者則杭之大滌也是山居洞天三十有四爲天柱福地距行都三舍御前崇奉有年矣宫宇宏壯獨闕巨鐘使命繹奏聞上思所以揭虔表靈廼紹定己丑病月丁亥有㫖命鑄仲秋己未告成夫山川流峙雲氣出没明神所以代化工而施利澤也霓楝横空鴻音徹漢聖天子所以鎭名山而昭丕貺也神有顯功上有垕報此殊庭盛事可無紀乎載攷圖籍唐大曆中有神應鐘台之黄巖因禱旱醻德卿人每以驗晴雨經建炎煨燼聲弗逮初開禧邊帥畢再遇於淮泗獲景靈舊鐘漕臣黄犖求寘之大滌亦既弇止然物乆則弊剥極宜復其革故鼎新必須時應數邇者宸命既頒幣出内帑工擇國良賜度牒以資其費融兼金以美其質衆橐一鼓大器立就其形不侈不弇不厚不薄其聲不石不播不柞不鬱鐘成樓亦加肆殆時數之偶歟近臣劉世亨承命凡事盡畫宣勞圖形以進天顔闓懌猗歟盛哉聖天子嘉惠名山與先朝賜田臨幸匹休於無窮矣夫形而上者謂之道形而下者謂之器鐘器也而道寓焉儻能因以永道則銷去鑛錯保合粹和内明外寂力到功深窮邃徑於華陽侍宸遊於月殿服猛獸於岩前藏金丹於箬下自然山川呈瑞神物薦休鳳鳴高崗龍蛻幽穴清泉沸井祥光燭天所謂地靈人傑豈昔有而今無邪無己則澄神寡慾體道修眞庶幾善人以多嘉祥自應雨可請暘可祈尚無負於清朝欽崇之意乃若聽考擊於晨暮昭報稱於熏修祝聖壽而保皇圖與洞天福地同其乆者又不待言喻也朝議大夫權尚書刑部侍郞兼同修國史實録院同修撰兼侍講曹叔遠撰演教堂記盤古開闢宇宙天先成而地後定故都天之號柱於八極者三不周以北存而勿論可也惟灊山之東杭山之南積氣温厚有雙柱峙焉以其上通太微之室故曰洞天以其中伏三辰三根故曰天柱道家者流好言天與帝而不以地對蓋維持主宰者在上地不過承之而已洞霄舊號天柱觀而演教堂則又接天柱之乳而流出道德者也先是堂列大門外傳者曰神營化造不類目巧之室殆未可知也後遭兵燬更創於正殿後紹興肇其迹開禧奂其宇端平又峻其基室虚而白楹廣而閑雌霓抱梁陽馬承楄堂之背疊石作巘曰聚仙亭翼步欄而上曰方丈室眈眈乎廣厦眞可談混元論黄虞矣矧惟我高宗皇帝曾手書度人經以鎭清眞之場孝宗皇帝御製古澗松詩以尊不老之道玉字扁於寧考金錢錫於慈皇今主上又勑命冲妙師大明董集斯事列聖修道崇教何其盛也堂甫成大明羽化而師孫處道與監宫大年及大欽述師之志綜其本末求記於潼川吴泳泳曰汝知所謂堂者因教而有堂邪所謂教者因堂而有教邪向者堂弊教亦弊邪今者堂新教亦新邪吾與子言堂有成壞而教無新故仙聖之所重惟教耳然聖人以身教也眞人以神聽也以身教故不悦道之華以神聽故不逐言之迹今營一畝之宫築環堵之室既勤樸斲又塗塈茨輪焉奂焉惟欲其美而身有玉廬心有絳宫脾有黄室肺有皓庭面有赤宅耳有三門喉有十二樓兩眉有紫户青房七竅有金關玉鑰皆自己之堂也而不能微也指三洞十二部爲教母綜五笥七千笈爲道樞勃勃旋於珠口團團走於環中便以口之所授爲演妙耳之所聞爲證眞而自有此山以來陰陽之浸昏曉之割日月之相推雲雷之相盪飄風暴雨卒歛於無雕煙縷霞復歸於朴鳥啼而林幽則動中有靜龍勢而霧滃則寂中有感變通而爲四序流形而爲品物不宰之宰不神之神皆自然之教也而莫之悟也處道曰若爾吾記則歷劫以至于今千聖之户庭荒矣雖然吾復爲子通之老氏之學根以清淨虚明行以慈儉忠孝其無爲也無不爲也近於易不爭也莫之爭也近於謨谷神之說近於虚受嬰兒之喻近於若保修養而引年近於祈天永命眞誥謂性與道合由道之體近於中庸王子謂一氣孔神於中夜存近於孟子若夫淮南原道之極至於和與性使父無喪子之憂兄無哭弟之哀童子不孤婦人不孀獸胎不殰鳥卵不殈則又吾孔門家法也作是堂已玉眸詵詵豈無望道而欲見者倘能味法如蜜調心如絃滌神識如鏡爲善無近名爲學不躐等雖有拱璧駟馬不能易吾進道之心則聖眞在己不必問鄰矣霞子研之哉雲孫瑩之哉淳祐三年七月既望寳章閣學士朝請大夫提舉隆興府玉隆萬壽宫中江縣開國子食邑六百户賜紫金魚袋吴泳記東陽樓記余裏登平都山訪濓溪周子舊遊亂碑中得小片周子題兩絶句點畫勁正猶存温厲之氣官合陽時筆也其一詠陰仙丹訣云始觀丹訣信希夷蓋得陰陽造化機子自母生能致立精神合後更知微又從山中人得觀丹訣一篇二十年間往來于心未忘也先墓在餘杭廬居山中數遊洞霄道藏寫本甚眞山廬無事時得假借無何閲之徧則知丹訣所云周子一言蔽之矣宫殿都監貝其姓大欽其名餘杭人賜號靈一作小樓寮中不侈不約可詩可觴愛其翼然於塵外也與客造焉請名適朝陽出高崗之上因作東陽樓三字遺之摘陰仙訣中語也今又十餘年矣丹訣則已忘之惟周子詩中之意炯然心目靈一之孫守一囑如圭來言曰靈一年八十六而卒願得向者名樓之義以發其幽光余曰乾元陽神吾資以始坤元陰精吾資以生元一也而分二體於是有尊卑有貴賤以尊卑言則先乾而後坤尊當在先也以貴賤言則先陰而後陽貴當居後也既有先後則有嗑有睽有同有訟不得而齊焉不齊則離離去爲變相保則合合爲大和物生於和死於變精神合一即日月合一日月合一乾坤之元復爲一此天地之正道萬物之公理聖人以是制爲禮樂達之天下禮無往而不來樂無進而不返斯道也在人或識其大或識其小未嘗墜也周衰道微四代禮樂之數掌於柱下史乃或取之以養其生雖然禮樂者大和之器也所以建天地溥萬物非有我之所得私也私之者小之也知廣而充之則大矣是故一物有盡而萬物無終一身有終而萬人無盡矣又何人己之分靈一以壽終矣四海之内一視而同其未死者皆靈一也不與天地同長乆乎平都煙塵蒼莽石刻之存者幾希由是以志諸洞霄尚不泯乎儒先之遺意不亦可哉咸淳元年中春資政殿學士宣奉大夫眉山楊棟記棲眞洞神光記紹定辛卯孟夏郎官楊公彦瞻游九鎖山幽巖邃谷無所不歷二十有一日至棲眞洞登東西兩臺洞絶頂故有若華蓋者方舉火燭之忽神光發東臺上圓如滿月青白相半升華蓋而止火爲奪明良乆乃散觀者驚異公顧問偕行羽衆是何祥邪思明對曰嘻二百二十餘年矣在祥符間國家崇尚玄教淛漕使陳文惠公率官屬有禱于大滌洞維時洞中出現是光照耀林麓文惠公表奏朝廷詔㫖褒嘉始改洞霄宫額而扁亭祥光爲一代盛典方今玄教之盛不異祥符公以勳舊子孫歷官郞署名位德望豈出文惠公下兩洞神光皆有爲而發非偶然者公憮然曰予何人敢望文惠公哉休徵之來偶相符契然不敢上負洞天之靈乃捐金買田若干以助齋庖以答神貺嗚呼攀天目漢元封彰神顯異何代無之謹以身所親見感動當世者刻著于石使來者有攷且無忘楊公之德公名伯嵒彦瞻其字和武恭王孫好善忘勢不異儒家子時有東臺仙子許參玄滿月光明現大千句曲題山中紹定五年夏至日當山道士元素大師王思明記演教堂揭扁法語洞霄大滌扈神京玉珮金璫會百靈天柱一尖凌碧落雲關九鎖疊蒼屏前峰後峰煙漠漠東洞西洞風泠泠見說坡仙詩墨在約君同坐翠蛟亭客入洞門清涵山骨寒層青未了古洞緑依然瀑布泉邊玉葉風摩千歲草雲根石畔金莖露浥萬年芝我將唤起閭丘玄同而更相招司馬承正左攀郭文舉右拍許遠遊陟天壇訪石室入藥圃謁草堂同登來賢岩去尋無骨箬萬杉鎖斷紅塵影三逕寒凝碧蘚班寔風雷飛伏之都乃龍神校閲之所所以翠華南幸有嚴香火之欽崇紫館西峨以待公台之均逸昔有金龍玉簡之典今存青詞朱表之儀列聖所共留神當今尤甚加禮今之日風和鸎喜水暖花香奉使國師寧國侍晨眞人面承綸㫖大滌蕆眞都録管轄上官侍晨鑒義知宫馮君隨弼飈乗協翊天馨來止仙都適丁盛事歲在丁丑宸翰演教堂三大字以賜住山冲妙大師龔大明越今五春方圓扁揭可謂鳳翥龍翔蛟騰虎躍奎躔璀璨雲漢昭回有兹鐵畫銀鈎宣示金填玉鏤光映草木榮溢煙霞以吾教之當興與名山之不朽方玉燭應天之日政金眞演教之時頃者山中慶成法堂獲此御墨雲甍煙桷上跨寒空月礎星塼妙爲法宇何異騫林之境宜安玉局之床闡三洞四輔之微敷八極九清之妙此牌既揭日月同明此話不誣人天孚照大衆且道揭牌一句如何讚祝九峰雲靜仁天廣五洞風清化日長嘉定十年辛巳三月道士白玉蟾撰重建洞霄宫記道爲三極之祖大包宇宙而不見其外細入毫粟而不見其内生陽生陰神鬼神帝陶鎔千聖橐籥萬象不見其跡是莫大乎天地此道撑拄乎天地莫幽乎山川此道充塞乎山川道即理理即太極太極本無極撑拄乎其上無一瞬之或息故曰天柱充塞乎其中無一隙之不周故曰洞天嗚呼爲天柱洞天之說者其知道乎其至人示以至道之精衆妙之門乎夫天有形道無體以無攝有誰爲之耶天至大洞至小以小納大誰司之邪天柱即大易統天立天之象老氏天地得一清寧之㫖洞天即大易天在山中之象老氏谷得一以盈之意無疑矣夷攷往諜女媧氏斷鼇足以立四極非鼇也道也天柱之喻也元始坐浮黎寳珠十方天神悉入其間何神也道也洞天之喻也餘杭大滌山洞霄宫爲三十六洞天之一與舒州壽陽天柱爲三金堂玉室上通太微奇異神秀不可殫紀漢武立館候神歷晋暨唐以至宋世累朝禮奉罙謹代生高人主張斯道咸淳甲戌臘月不戒于火千礎皆灰會世運更革歸化聖朝山中諸老合力營之既底于成爲力勤矣至元甲申六月鬱攸洊作一夕復盡四衆環視於邑太息提點宫事一山郞公如山提舉宫事桂林舒公元一敏毅介特人也不沮不懼宣言於衆曰吾將新之取木他山運粟他所叶心集思鳩工度材先建庖帑乃築大殿以及餘屋元貞乙未之三月壬子告成金碧瑰麗照映林谷神運鬼工殆不是過朝家欽崇護持視昔有加既成囑予爲記予辭不可已而告之曰洞有天天有柱吾言於前矣天中有天蓋終言之夫天中之天上極無上是爲三境境雖三清則一也又三其三爲九名雖九清則一也學道之人煉陽消陰朝夕存存以我之清同造物之清清乎清乎超萬形而不壞者乎遂筆之記元貞元年歲次乙未九月乙亥前端明殿學士中奉大夫簽書樞密院事兼參知政事家鉉翁記昊天閣記太極之動生陽而靜生陰陽輕清上爲天日月星辰雷電風雨麗焉陰重濁下爲地丘陵山嶽川澤江海麗焉陽變陰化其氣冲和則爲人其兩間莫不有生宰者焉恭惟昊天玉皇上帝陛下位三極之尊御萬有之衆凡天地所以覆載日月所以照臨星辰所以運行雷電風雨所以薄激蕩沃丘陵山嶽之所以鬱盤所以流浸生人之類所以相生相養萬古而不息孰知乎帝力哉道經載天地之内自十大洞天外復有洞天三十六所仙官所領爲天帝下府今大滌玄蓋洞天其二十有四也自漢元封建立宫壇歷晋逮唐異人代出更爲天柱觀宋祥符間又更洞霄宫舊誌所載地望之重與嵩山崇福並爲天下宫觀稱首信矣寥寥二千餘年興廢不一而自歲甲戌迄于甲申十一年間再厄天變邃館層樓化爲飛埃土木之興難矣故自大殿東西廡齋庫兩堂外力不暇給若三門若諸祠宇悉山中耆老分任營構而相成昊天閣者今住山清修明素冲道法師舒公元一清修養素冲妙法師沈公多福也是閣據四山會屹然大殿東高七十餘尺廣五楹跂翼翬飛壯觀形勝昔所未有是雖妙有玄眞渺渺乎罡風灝炁之表然神化無方何所弗至遐想鈎天廣樂宴遊玉京顧瞻下府乃有高居延奉若是之盛者其必爲皇靈所眷矣人之身神在泥丸猶昊天也黄庭中虚猶所謂洞天帝之下府也使中虚之地吾神來舍是一身太平乆之必仙使高高在上者容光下燭豈不能祈永命爲國家太平地哉是閣遠所繫甚重副宫事高公會辰都監宫事金公常清咸與有力宜書大德六年壬寅十二月望日錢塘鄧牧記白鹿山房記大滌洞天發天目盤薄苕溪陽形勢最浙右自古有道來游來居仙去可數然山中泉石勝處率多北向向南而勝者白鹿一山爾是山爲大滌中峰升天壇在上其下石室按舊志晋許遠游眞君作壇煉丹丹成天下白鹿迎去所以名山也唐吴貞節天師美文詞與太白齊名嘗搆石室爲藏書地逮尸解宣城語弟子當還天柱石室此石室所以著也宋陸永仲王元素朱復常諸君相繼於此得道著益甚自永仲築舍隸洞霄宫俯仰幾二百年興廢不一大德甲辰沈公介石住山登覽樓愴追前修而弗返吊遺跡其將湮規營高居以待畸士顧土木繁興力有未暇者於是徐和父贊曰屋無儉奢取足庇風雨郭文舉其人豈以苫覆爲嫌耶否則食粟而已納之廣厦奚益乃作數檻石室顚雖門館庖湢不過具體然前睨天柱後負升天壇龍鳳兩洞左路所從入棲眞洞右望而見之四周上勢若屏幛環合下五巨松翼然拱立薰風足以祖暑愛日足以辟寒雪晨月夜莫兹境爲絶庶幾方外高躅肯息焉時杭人牧心鄧公適留山中孟公集虚與其徒孫史元甫爲附屋後偏介兩石若樓船而方將使遂棲隱志鄧氏益命工發土得奇石五六東偏有窾腹穴趾若丹竈者有高下聯屬爲壼若刻漏者有圓竅橫貫其首而頂鋭若犀載角者若蟻蛭峰房交錯相穿者西偏則紺碧玲瓏三面環峙儼然罘罳凡廣不數丈千岩萬壑情狀畢具曠古珍藏坐致目睫間則憮而嘆曰有是哉夫石山川之精秀融結翳蔽土壤不知幾何年一旦有識者發之有力者拔之始得爲人境絶觀與天地不弊人獨無是秀且精乎曰爲情欲之土所翳事物之壤所蔽相發者無識自拔者無力以至於晦昧而終仰望晋唐宋諸君如龍魚如虎鼠如鵬鷃不我相謀曾不若一石之有契也語未既余適以月夜登山爲余道本末如此且問名屋因命循其本曰白鹿山房復爲記之大德九年乙巳四月望日滌山卑隱錢塘葉林記元清宫記元清宫者提點住持洞霄宫事舒尊師所建也曰山素齋按侍者何洞霄列齋十有八山素其一而元清隸焉方外士於此而憩也去餘杭而卜築於臨安之錦南鄉者何師生育之地也宫何以曰元清師名元一其徒金公名常清嗣守其業合而名之也晋史所載臨安多金堂玉室仙人芝草漢末從此得道者有之宫占勝其間東拱琴鶴之山西挹石鏡上接九仙天目下連九鎖天柱南北二溪繇天目發源而合流於獨山如錦爲帶山川獻狀此爲奇絶余雖未涉其地嘗聽師言固已先入夢境宫成師踵門謂余曰吾崎嶇歷落人也自幼無怙無恃煢然出俗遂入道洞霄徐公應時吾祖也一見即以嗣法相期時生計最薄若謂吾足以振起香火縁者每懼無以副前人期待刻志其所宜學粗克有進職分所在不敢卑庖禀之任歲在丁未被冠裳以來凡道家事如表章科笈手書口誦罔或弗力首治居室易故而新甲戌洞霄火迨歸皇元職方之九年爲至元甲申復火數矣夫凡瓦礫化爲金碧金碧轉爲瓦礫又於劫灰之餘使公宇私室悉還舊觀當始附時簞食壼漿之奉身非所顧而奔避四外者得以安集吾雖不敢謂功亦良勞止其於吾祖付托初意庶乎無負在洞霄自掌章表領庫事至宫副住持如歷階然無躐等踰分之想教門職任自杭州路道録而浙西道提舉住持開元宫凡受管領道教所劄授一是前輩講師舉所知不識媒身耆進爲何事慨念錦南故里釣遊遺跡儼存親新劬勞未報自視欿然諉曰太上忘情可乎因出衣鉢所儲即故址創此道場報本也寥陽殿以奉三清璇璣閣以禱祠七政舉衆仰祝聖壽昕夕罔弗欽祀先有祠道紀雲會各有堂三門兩序具體迨庖湢無缺經始於甲午歲落成于大德己亥棟宇藻麗像設森嚴有山可薪園可蔬附郭之田可饘粥香燈之費仰田租之入今天師眞人拜祖庭道由宫間顧瞻輪奂喜溢眉宇大書今額以鎭此山命吾開山住持常清則提舉知宫事甲乙流傳其永無斁初常清與吾師孫金正韶於是薦賢輸力爲多清自號玉鑑韶號約山韶物化乆吾將於清之次俾周鼎傳董貴寧又嗣守焉别爲元清派與洞霄派相伯仲而亞之宫之金穀出納須洞霄提其綱夫事爲之制乃可經乆亡敝然匪托之金石恐乆而遂泯願求文於執事以圖不朽烏乎以師所述云然非閲歷深識慮周且遠其克爾耶元者氣之始天得而清用能長上古而不老統萬有而不宰考之洞天有曰太玄司眞曰昇眞元化後人名殊庭眞館或以玄眞或以昇元然則合而名之之義豈無据哉而況陸蓮紀關尹之瑞香爐鍾弘景之美於此而致其孝思且地勝得於不擇殆天予神授者余故樂爲之記至若匠事計工費爲緡者若干此常事也不書師丁酉歲二月欽奉聖㫖大護持越二年秋七月欽受提點住持宣命十二月鎭遠王奏賜通明養素眞卿冠簡法服爲時榮遇師老氏典刑同衣之士稱爲桂林先生云大德四年二月己未日翰林侍講學士奉義大夫知制誥兼修國史張伯淳記重建冲天觀記仁知不能一其性金其樂者爲難勢願不能兼其力成於乆者非易山林也臯壤也其成也毁也其樂也神者有所不喜又何弊弊焉窮歲月之力以役於物爲役於物非道也不役乎物亦豈所以爲道乎百姓不知於日用儒者不離於須臾而沉名之必可言言之必可行觀於山而千岩競秀有重玄之理臨於水而萬派同歸幾上善之德假物以用又焉往而非道邪冲天觀者舊創於吴興之别墅水國風高白蘋秋老與鷺朋鷗侣相期於浩渺間先祖師蓬山孫公菊岩龔公清溪周公之志也願煙未憗劫石倏遷城郭是非幾類華表之鶴塵波清淺無異蓬萊之舟舍其舊而圖新去諸遠其即近則大滌山之門户有若天開萍水路之往來居然雲集雖與規規尺寸於廛閈間異然地非不廣袤求其四平如砥者絶少材木非不勝用亦安能神運而鬼輸高者夷之卑者廊之榛者闢之洼者盈之其爲力豈不戛戛乎尤難後之入是門而遊目登斯堂而坐嘯揖白雲而邀素月談何容易哉凡爲工若干歲日爲費若干緡粟姑誌其成若夫一日必葺是所望於將來之子若孫是所謂願也非勢也故系之以詞曰大滌之山兮峨峨而高大滌之水兮涓涓而滔大滌之林木從拱把至於蔽翳雖濯濯非昔比終能自拔於蓬蒿今之去地五丈而成九仞其始一簣之勞嗚呼據梧而瞑杖策而遨盍觀此身以道自名也當如肯堂之構無如塞路之茅山吾仁而水吾智小無不具大無不包膚寸扶揺於羊角一勺膏潤於田毛故凡積以歲月而畢備者寧能闕然於一毫世之所謂倫理道之所謂功行與願力有一或闕於天地間罪將焉逃贊皇公云毁平泉一木一石者非吾予孫所願呵護之力却厲鬼於山左移文之靈勒俗駕於岩坳金石未泐言必行行之必遠誠不能不望於之代庖者也至元二十六年己丑二月望日住山沈多福記冲天觀記兩浙山水之勝最東南繇浙江西杭最繇杭西餘杭最逆天目大溪上十有八里曰洞霄宫者是爲大滌洞天又餘杭最勝處也未至宫數里兩山翼道折爲九鎖佳氣盤鬱是以得道士若晋郭許二眞君唐吴貞節暨子虚閭丘玄同輩高蹈其間遺跡具在至今探幽訪古使人翛然欲仙介九鎖外有山名仁壽氣勢特偉衆山所宗然荆棘隱翳過者莫之覿至元壬午前知洞霄宫事周公曰清溪翁得兹地愛甚與其徒張公漢傳命工鑿三面山趾二百餘丈闢爲夷壤棟宇之先是宋咸淳間翁祖靈濟孫先生洎翁師演教龔先生請冲天觀賜額隸錢塘者建觀霅溪上尋以難毁至是徙而扁焉四五年間事未竟干公相先後遺世今主席洞霄沈公介石爲翁法孫竭力營繕乃完若殿若堂若門廡秧秩有度空翠入房闥清流入庖厨四山環匝百木薈蔚行道上者聞鐘磬音而不見觀所在住山中者聞車馬聲而不見路所自後山益峻則迂徑以陟蒔花竹待遊觀者其稍平處間列坐石可憩其最高甃圓壇可眺遠携琴詠詩可以永日時延方外士居之公暇日輕車往來共談玄理嘗語衆曰地之勝也人居之則榛莽不得荒吾階庭豺虎不得闖吾藩墻豈不爲天下安宅身之安也心居之則耆欲不得榛莽其内利害不得豺虎其外豈不爲山中隱仙夫善居其心者亦若居其身爾大滌古洞天兹山大滌所從發凡居斯者豈盡出晋唐人下必有脱跡塵滓飛神青冥以不負祖師素願所營與吾中心所期然後足以符冲天之意衆曰唯牧時過沈公法孫孟集虚與聞于此遂爲識之大德五年庚子上元日石室隱居鐵塘鄧牧記清眞道院記餘杭西十有八里曰九鎖山逆溪水上左右山趾相錯行者縈其間前直百步外若斷無路爲鎖一也迄九鎖山勢差直上則爲洞霄宫左折爲東天柱嶺西北泉石最勝曰青檀山舊誌載月窟冰壼鏡潭試劍岩湧翠石壁悉在兹山爾宋咸淳間前知洞霄宫事凝神朱先生以先世諸墓在作祠山陽先生殁至元己丑其徒沖逸孫法師與其孫今靜逸法師舒公闢而廣之曰清眞道院爲屋凡五六十楹而門廡殿堂齋閤庖湢咸有法度松杉垂陰花卉迭芳白晝無聲不類人境大門内流泉所直則發石甃址四周若墻趾坎爲方池畜金鯽百數扣欄檻悉至取食山下飛玉泉懸瀑數仞自是出也歲庚子余過舒公憩暑于此相與觴詠爲藥暇日登高指余諸山慨然曰宫西南爲伏虎岩晋郭文舉隱也西昇天壇許遠遊沖舉也其下石室唐吴貞節仙去瘞書劍也北大滌洞則暨子虚得道長往與吾遠祖玄同先生築室後入兹洞以達華陽也神仙者學雖由内煉亦山川之靈發之俯仰千歲風氣不殊誠有作者豈遽遜晋唐人哉奈何留連光景醉而生夢而死者比比皆是百年榮華與化俱盡千劫流浪其憂無涯何不運靈旗孕火芝回風返景於寸田尺宅之間馭氣飛神於清都紫微之上而與數君子相視一笑若是則内不負吾先外不愧吾大滌洞天其可乎余曰唯大德四年庚子七月錢塘鄧牧記集虚書院記杭孟法師字集虚築室苕溪上爲讀書地以其字扁之余聞老氏云三十輻共一轂當其無有車之用知虚者萬有所從集也竅虚而風集坎虚而水集谷虚而雲集室屋之虚也人集焉天地之虚也日月星辰山河草木羽毛鱗介集焉孰謂吾一心虚而不爲道所集乎然心之爲物可虚可窒道之爲物惟恍惟忽向焉所謂集皆可得見而此不可知故虚者每爲異物所窒恍兮忽兮者將弗集矣一心無樊攻焉者衆喜怒哀樂毒其内是非得喪冠其外欲斯須之虚有不可得者若是求道亦擊鼓而求唐子也吾孟師不然師儒者而寄迹道家流爲詩文咸有法度煉玄養素九鎖山中齋居者三年既乃爲世故役弗遂其志戚戚然惡之所蓄書數千卷將室成而藏焉且與方外奇士遊居講習于此所得殆未可量然余謂師無志於道則已苟有志書亦累也比見世讀書者四方萬里無所不通上下數千載無所不聞歸而求其本心則虚焉者寡矣聖人之道遂爲絶學可歎也願師悉棄所藴於無何有之鄉然後即方寸之地朝而闢焉暮而滌焉使介然之有不得累乎其中師益矣顔子始好學終坐忘惟道集虚蓋深造自得之妙顔何人哉大德三年己亥正月錢塘鄧牧記大滌洞天記卷下
